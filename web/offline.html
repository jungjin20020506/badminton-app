<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>KNK 지킴 — 팀서버 연결 안 됨</title>
  <style>
    body { margin:0; font-family:"Pretendard","Noto Sans KR","Malgun Gothic",sans-serif;
      background:#0D0F12; color:#F2F4F7; display:flex; align-items:center;
      justify-content:center; min-height:100vh; text-align:center; }
    .box { max-width:420px; padding:40px 28px; }
    .icon { width:72px; height:72px; border-radius:18px; background:#12233D;
      display:flex; align-items:center; justify-content:center; margin:0 auto 20px;
      font-size:34px; }
    h1 { font-size:19px; margin:0 0 10px; }
    p { font-size:14px; color:#A8B0BC; line-height:1.7; margin:0 0 8px; }
    b { color:#F2F4F7; }
    .btn { display:inline-block; margin-top:22px; padding:11px 26px; border-radius:8px;
      background:#2E7DE1; color:#fff; font-weight:600; font-size:14px; border:0;
      cursor:pointer; }
    .btn:hover { background:#4C93F2; }
    .hint { margin-top:16px; font-size:12px; color:#6B7380; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>현재 팀서버가 열려있지 않습니다</h1>
    <p><b>팀서버 PC</b>에서 <b>팀서버_시작.bat</b>을 실행해야 접속할 수 있습니다.</p>
    <p>팀서버가 켜져 있는데도 이 화면이 보이면, 같은 사내망(와이파이/유선)에
       연결되어 있는지 확인해 주세요.</p>
    <button class="btn" onclick="location.reload()">↻ 다시 연결</button>
    <div class="hint">팀서버가 켜지면 이 버튼 한 번으로 바로 들어갑니다 — 앱을 다시 설치할 필요 없습니다.</div>
  </div>
  <script>
    // 15초마다 자동 재시도 — 팀서버가 켜지면 사용자가 안 눌러도 들어가진다
    setInterval(async () => {
      try {
        const r = await fetch('/', { method: 'HEAD', cache: 'no-store' });
        if (r.ok) location.reload();
      } catch (e) { /* 아직 꺼져 있음 */ }
    }, 15000);
  </script>
</body>
</html>
